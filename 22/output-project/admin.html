<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0B0907">
<title>順記後臺管理</title>
<style>
  :root{
    --bg:#0B0907; --card-1:#1B1510; --card-2:#110D0A;
    --gold:#E7CB92; --gold-soft:#C9A96B; --ink:#F0E8DB; --muted:#948A7E;
    --hair:rgba(231,203,146,.18); --edge:rgba(231,203,146,.30);
    --ok:#5FD08A; --no:#D97C6E;
    --serif:"Songti TC","Noto Serif CJK TC","Noto Serif TC",serif;
    --sans:"PingFang TC","Noto Sans CJK TC","Noto Sans TC",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;min-height:100dvh}

  /* ── 登入畫面 ── */
  #login-screen{
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px;
  }
  .login-box{
    width:100%;max-width:360px;
    background:linear-gradient(180deg,var(--card-1),var(--card-2));
    border:1px solid var(--edge);border-radius:22px;padding:40px 28px 36px;
    box-shadow:0 24px 60px -24px rgba(0,0,0,.9);
  }
  .login-logo{text-align:center;margin-bottom:28px}
  .login-logo h1{font-family:var(--serif);font-size:28px;color:var(--gold);margin:0 0 6px;letter-spacing:.14em}
  .login-logo p{color:var(--muted);font-size:13px;letter-spacing:.08em;margin:0}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--muted);letter-spacing:.06em;margin-bottom:8px}
  .field input{
    width:100%;background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:10px;padding:13px 14px;color:var(--ink);font-size:15px;
    font-family:var(--sans);outline:none;transition:border-color .18s;
  }
  .field input:focus{border-color:var(--gold-soft)}
  .login-err{color:var(--no);font-size:13px;text-align:center;margin:0 0 14px;min-height:18px}
  .btn-login{
    width:100%;background:var(--gold);color:#0B0907;border:none;border-radius:12px;
    padding:15px;font-family:var(--serif);font-size:17px;font-weight:700;
    letter-spacing:.1em;cursor:pointer;transition:filter .18s;
  }
  .btn-login:hover{filter:brightness(1.08)}
  .btn-login:active{filter:brightness(.93)}

  /* ── 後臺主畫面 ── */
  #admin-screen{display:none;min-height:100dvh}
  .topbar{
    background:linear-gradient(90deg,var(--card-1),#130F0C);
    border-bottom:1px solid var(--edge);padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:10;
  }
  .topbar-title{font-family:var(--serif);font-size:18px;color:var(--gold);letter-spacing:.1em}
  .topbar-sub{color:var(--muted);font-size:12px;margin-top:2px;letter-spacing:.04em}
  .btn-logout{
    background:transparent;border:1px solid var(--edge);color:var(--muted);
    border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;
    font-family:var(--sans);transition:color .15s,border-color .15s;
  }
  .btn-logout:hover{color:var(--gold);border-color:var(--gold-soft)}

  .main{max-width:840px;margin:0 auto;padding:28px 16px 60px}

  /* ── 分頁 ── */
  .tabs{display:flex;gap:4px;margin-bottom:26px;border-bottom:1px solid var(--hair);padding-bottom:0}
  .tab{
    background:none;border:none;border-bottom:2px solid transparent;
    color:var(--muted);font-size:14px;font-family:var(--sans);
    padding:10px 16px 12px;cursor:pointer;letter-spacing:.06em;
    transition:color .15s,border-color .15s;margin-bottom:-1px;
  }
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab:hover:not(.active){color:var(--ink)}

  /* ── 卡片 ── */
  .section{
    background:linear-gradient(180deg,var(--card-1),var(--card-2));
    border:1px solid var(--edge);border-radius:18px;padding:24px 22px;margin-bottom:20px;
  }
  .section-title{
    font-family:var(--serif);font-size:16px;color:var(--gold);
    letter-spacing:.1em;margin:0 0 20px;display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:var(--hair)}

  /* ── 品牌設定 ── */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  .form-row.full{grid-template-columns:1fr}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group label{font-size:12px;color:var(--muted);letter-spacing:.06em}
  .form-group input,.form-group textarea,.form-group select{
    background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:9px;padding:10px 12px;color:var(--ink);font-size:14px;
    font-family:var(--sans);outline:none;transition:border-color .18s;resize:vertical;
  }
  .form-group input:focus,.form-group textarea:focus,.form-group select:focus{
    border-color:var(--gold-soft)
  }

  /* ── 圖片上傳 ── */
  .img-section{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:560px){.img-section{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
  .img-slot{
    background:rgba(255,255,255,.04);border:1px dashed var(--hair);border-radius:12px;
    padding:16px;text-align:center;cursor:pointer;transition:border-color .18s;
    position:relative;overflow:hidden;
  }
  .img-slot:hover{border-color:var(--gold-soft)}
  .img-slot input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .img-slot .thumb{
    width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:8px;display:block;
    background:rgba(255,255,255,.03);
  }
  .img-slot .label{font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:.04em}
  .img-slot .placeholder{
    width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.03);border-radius:8px;
  }
  .img-slot .placeholder svg{opacity:.3}
  .img-slot .hint{font-size:11px;color:var(--muted);margin-top:6px}
  .img-slot .remove-btn{
    position:absolute;top:20px;right:20px;background:rgba(0,0,0,.6);
    border:1px solid var(--no);color:var(--no);border-radius:6px;
    padding:3px 8px;font-size:11px;cursor:pointer;z-index:2;display:none;
  }
  .img-slot:hover .remove-btn{display:block}

  /* ── 菜單品項 ── */
  .menu-grid{display:flex;flex-direction:column;gap:10px}
  .menu-item{
    background:rgba(255,255,255,.04);border:1px solid var(--hair);border-radius:12px;
    padding:14px 14px 14px 16px;display:grid;
    grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;
  }
  .menu-item-name{font-size:14px;color:var(--ink)}
  .menu-item input[type=number]{
    background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:8px;padding:7px 10px;color:var(--gold);font-size:14px;
    font-family:var(--sans);width:90px;text-align:right;outline:none;
    transition:border-color .18s;
  }
  .menu-item input[type=number]:focus{border-color:var(--gold-soft)}
  .menu-item input[type=text]{
    background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:8px;padding:7px 10px;color:var(--ink);font-size:14px;
    font-family:var(--sans);width:140px;outline:none;transition:border-color .18s;
  }
  .menu-item input[type=text]:focus{border-color:var(--gold-soft)}
  .qty-wrap{display:flex;align-items:center;gap:6px}
  .qty-btn{
    background:rgba(231,203,146,.12);border:1px solid var(--hair);
    color:var(--gold);border-radius:7px;width:30px;height:30px;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .15s;user-select:none;
  }
  .qty-btn:hover{background:rgba(231,203,146,.22)}
  .qty-val{font-size:15px;color:var(--gold);font-weight:600;min-width:28px;text-align:center}
  .del-btn{
    background:none;border:1px solid rgba(217,124,110,.35);color:var(--no);
    border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  .del-btn:hover{background:rgba(217,124,110,.12)}
  .add-item-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .add-item-row input{
    background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:9px;padding:10px 12px;color:var(--ink);font-size:14px;
    font-family:var(--sans);outline:none;transition:border-color .18s;flex:1;min-width:120px;
  }
  .add-item-row input:focus{border-color:var(--gold-soft)}
  .btn-add{
    background:rgba(231,203,146,.12);border:1px solid var(--edge);
    color:var(--gold);border-radius:9px;padding:10px 18px;
    font-size:14px;cursor:pointer;white-space:nowrap;transition:background .15s;
  }
  .btn-add:hover{background:rgba(231,203,146,.22)}

  /* ── 儲存按鈕 ── */
  .save-bar{
    position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--hair);
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
    max-width:840px;margin:0 auto;
  }
  .save-status{font-size:13px;color:var(--ok);opacity:0;transition:opacity .3s}
  .save-status.show{opacity:1}
  .btn-save{
    background:var(--gold);color:#0B0907;border:none;border-radius:12px;
    padding:13px 32px;font-family:var(--serif);font-size:16px;font-weight:700;
    letter-spacing:.1em;cursor:pointer;transition:filter .18s;white-space:nowrap;
  }
  .btn-save:hover{filter:brightness(1.08)}
  .btn-save:active{filter:brightness(.93)}
  .btn-preview{
    background:transparent;border:1px solid var(--edge);color:var(--gold-soft);
    border-radius:12px;padding:13px 20px;font-size:14px;cursor:pointer;
    transition:border-color .18s,color .18s;white-space:nowrap;
  }
  .btn-preview:hover{border-color:var(--gold);color:var(--gold)}

  /* ── 顏色設定 ── */
  .color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .color-item{display:flex;flex-direction:column;gap:6px}
  .color-item label{font-size:12px;color:var(--muted);letter-spacing:.04em}
  .color-row{display:flex;align-items:center;gap:8px}
  .color-row input[type=color]{
    width:38px;height:38px;border:1px solid var(--hair);border-radius:8px;
    background:transparent;cursor:pointer;padding:2px;
  }
  .color-row input[type=text]{
    flex:1;background:rgba(255,255,255,.06);border:1px solid var(--hair);
    border-radius:8px;padding:8px 10px;color:var(--ink);font-size:13px;
    font-family:monospace;outline:none;transition:border-color .18s;
  }
  .color-row input[type=text]:focus{border-color:var(--gold-soft)}

  /* ── 預覽頁 ── */
  .pane{display:none}
  .pane.active{display:block}

  /* ── 通知 ── */
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);
    background:#1E1811;border:1px solid var(--edge);color:var(--gold);
    padding:12px 20px;border-radius:999px;font-size:14px;letter-spacing:.05em;
    opacity:0;pointer-events:none;transition:.25s ease;z-index:99;
    max-width:88vw;text-align:center;
  }
  .toast.on{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<!-- ══════════════ 登入畫面 ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>順記後臺</h1>
      <p>管理系統 · 請先登入</p>
    </div>
    <div class="field">
      <label>帳號</label>
      <input type="text" id="inp-user" placeholder="輸入帳號" autocomplete="username">
    </div>
    <div class="field">
      <label>密碼</label>
      <input type="password" id="inp-pass" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <p class="login-err" id="login-err"></p>
    <button class="btn-login" id="btn-login">登入</button>
  </div>
</div>

<!-- ══════════════ 後臺主畫面 ══════════════ -->
<div id="admin-screen">
  <div class="topbar">
    <div>
      <div class="topbar-title">順記後臺管理</div>
      <div class="topbar-sub" id="topbar-user">管理員</div>
    </div>
    <button class="btn-logout" id="btn-logout">登出</button>
  </div>

  <div class="main">
    <!-- 分頁 -->
    <div class="tabs">
      <button class="tab active" data-tab="brand">品牌設定</button>
      <button class="tab" data-tab="menu">菜單品項</button>
      <button class="tab" data-tab="images">圖片管理</button>
      <button class="tab" data-tab="colors">配色調整</button>
    </div>

    <!-- ── 品牌設定 ── -->
    <div class="pane active" id="pane-brand">
      <div class="section">
        <div class="section-title">基本資訊</div>
        <div class="form-row">
          <div class="form-group">
            <label>品牌名稱</label>
            <input type="text" id="cfg-brand" placeholder="順記">
          </div>
          <div class="form-group">
            <label>品牌副標</label>
            <input type="text" id="cfg-brandSub" placeholder="碳燒燒鵝 · 線上點餐">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label>收據頁尾文字</label>
            <input type="text" id="cfg-footer" placeholder="此圖為訂單內容，請商家回覆確認">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label>LINE 社群連結</label>
            <input type="text" id="cfg-community" placeholder="https://line.me/ti/g2/xxxxxxxx">
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">示範訂單預設值</div>
        <div class="form-row">
          <div class="form-group">
            <label>訂單編號前綴</label>
            <input type="text" id="demo-prefix" placeholder="SJ">
          </div>
          <div class="form-group">
            <label>預設取餐方式</label>
            <select id="demo-mode">
              <option value="外送">外送</option>
              <option value="自取">自取</option>
              <option value="內用">內用</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 菜單品項 ── -->
    <div class="pane" id="pane-menu">
      <div class="section">
        <div class="section-title">菜單品項管理</div>
        <div class="menu-grid" id="menu-grid"></div>
        <div class="add-item-row">
          <input type="text" id="new-item-name" placeholder="品項名稱（例：碳燒原隻燒鵝腿飯）">
          <input type="number" id="new-item-price" placeholder="定價" min="0" step="10" style="width:110px">
          <button class="btn-add" id="btn-add-item">＋ 新增品項</button>
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:12px;letter-spacing:.04em">
          ※ 數量欄位為示範訂單的預設份數；顧客點餐時可自行調整。
        </p>
      </div>
    </div>

    <!-- ── 圖片管理 ── -->
    <div class="pane" id="pane-images">
      <div class="section">
        <div class="section-title">收據圖片設定</div>
        <div class="img-section">
          <div class="img-slot" id="slot-logo">
            <input type="file" accept="image/*" data-target="logo" onchange="handleImgUpload(this)">
            <div class="placeholder" id="logo-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--gold)" opacity=".4">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
            <img class="thumb" id="logo-thumb" alt="品牌 Logo" style="display:none">
            <div class="remove-btn" onclick="removeImg('logo',event)">✕ 移除</div>
            <div class="label">品牌 Logo</div>
            <div class="hint">建議 PNG 透明背景，方形比例最佳</div>
          </div>
          <div class="img-slot" id="slot-banner">
            <input type="file" accept="image/*" data-target="banner" onchange="handleImgUpload(this)">
            <div class="placeholder" id="banner-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--gold)" opacity=".4">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
            <img class="thumb" id="banner-thumb" alt="頂部橫幅" style="display:none">
            <div class="remove-btn" onclick="removeImg('banner',event)">✕ 移除</div>
            <div class="label">頂部橫幅</div>
            <div class="hint">寬幅圖片，顯示在收據頂部</div>
          </div>
          <div class="img-slot" id="slot-watermark">
            <input type="file" accept="image/*" data-target="watermark" onchange="handleImgUpload(this)">
            <div class="placeholder" id="watermark-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--gold)" opacity=".4">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
            <img class="thumb" id="watermark-thumb" alt="浮水印" style="display:none">
            <div class="remove-btn" onclick="removeImg('watermark',event)">✕ 移除</div>
            <div class="label">收據浮水印</div>
            <div class="hint">PNG 透明背景，會疊在收據中央（透明度 10%）</div>
          </div>
          <div class="img-slot" id="slot-stamp">
            <input type="file" accept="image/*" data-target="stamp" onchange="handleImgUpload(this)">
            <div class="placeholder" id="stamp-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="var(--gold)" opacity=".4">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
            <img class="thumb" id="stamp-thumb" alt="印章/章戳" style="display:none">
            <div class="remove-btn" onclick="removeImg('stamp',event)">✕ 移除</div>
            <div class="label">品牌印章</div>
            <div class="hint">顯示在收據右下角</div>
          </div>
        </div>
        <p style="font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.04em">
          ※ 圖片儲存在瀏覽器本機（localStorage）。上傳後按「儲存設定」才會生效。
        </p>
      </div>
    </div>

    <!-- ── 配色調整 ── -->
    <div class="pane" id="pane-colors">
      <div class="section">
        <div class="section-title">配色設定</div>
        <div class="color-grid" id="color-grid"></div>
        <div style="margin-top:18px">
          <button class="btn-add" onclick="resetColors()" style="background:rgba(217,124,110,.1);border-color:var(--no);color:var(--no)">
            ↺ 重設為預設配色
          </button>
        </div>
      </div>
    </div>

    <div style="height:80px"></div>
  </div><!-- /main -->

  <!-- 儲存列 -->
  <div class="save-bar">
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-preview" onclick="openPreview()">預覽收據 →</button>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="save-status" id="save-status">✓ 已儲存</span>
      <button class="btn-save" id="btn-save">儲存設定</button>
    </div>
  </div>
</div><!-- /admin-screen -->

<div class="toast" id="toast"></div>

<script>
/* ══════════ 帳號密碼 ══════════ */
const CRED = { user: 'a032640001', pass: 'qq1111' };

/* ══════════ 預設配色 ══════════ */
const DEFAULT_COLORS = {
  bg:       { label:'背景色',    val:'#0B0907' },
  cardTop:  { label:'卡片漸層上',val:'#1B1510' },
  cardBot:  { label:'卡片漸層下',val:'#110D0A' },
  gold:     { label:'金色（主）',val:'#E7CB92' },
  goldSoft: { label:'金色（副）',val:'#C9A96B' },
  ink:      { label:'內文白色',  val:'#F0E8DB' },
  muted:    { label:'灰色文字',  val:'#948A7E' },
};

/* ══════════ 預設設定 ══════════ */
const DEFAULT_CFG = {
  brand:'順記', brandSub:'碳燒燒鵝 · 線上點餐',
  footer:'此圖為訂單內容，請商家回覆確認',
  communityUrl:'', demoPrefix:'SJ', demoMode:'外送',
  colors: Object.fromEntries(Object.entries(DEFAULT_COLORS).map(([k,v])=>[k,v.val])),
  menuItems:[
    { name:'碳燒原隻燒鵝腿飯', price:220, qty:1 },
    { name:'碳燒半隻燒鵝',     price:380, qty:1 },
    { name:'叉燒飯',           price:130, qty:1 },
    { name:'油雞飯',           price:120, qty:1 },
  ],
  images:{ logo:null, banner:null, watermark:null, stamp:null }
};

/* ══════════ 狀態 ══════════ */
let cfg = {};

/* ══════════ Toast ══════════ */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>t.classList.remove('on'),2400);
}

/* ══════════ 登入 ══════════ */
function tryLogin(){
  const u=document.getElementById('inp-user').value.trim();
  const p=document.getElementById('inp-pass').value;
  if(u===CRED.user && p===CRED.pass){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-screen').style.display='block';
    document.getElementById('topbar-user').textContent='登入帳號：'+u;
    loadCfg();
  } else {
    document.getElementById('login-err').textContent='帳號或密碼錯誤，請重試';
    document.getElementById('inp-pass').value='';
  }
}
document.getElementById('btn-login').onclick=tryLogin;
document.getElementById('inp-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('inp-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('inp-pass').focus(); });
document.getElementById('btn-logout').onclick=()=>{
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('inp-pass').value='';
  document.getElementById('login-err').textContent='';
};

/* ══════════ 分頁 ══════════ */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-'+tab.dataset.tab).classList.add('active');
  };
});

/* ══════════ 載入設定 ══════════ */
function loadCfg(){
  try { cfg = JSON.parse(localStorage.getItem('shunji_admin_cfg') || 'null') || JSON.parse(JSON.stringify(DEFAULT_CFG)); }
  catch(e){ cfg = JSON.parse(JSON.stringify(DEFAULT_CFG)); }
  renderAll();
}

function renderAll(){
  // 品牌
  document.getElementById('cfg-brand').value        = cfg.brand||'';
  document.getElementById('cfg-brandSub').value     = cfg.brandSub||'';
  document.getElementById('cfg-footer').value       = cfg.footer||'';
  document.getElementById('cfg-community').value    = cfg.communityUrl||'';
  document.getElementById('demo-prefix').value      = cfg.demoPrefix||'SJ';
  document.getElementById('demo-mode').value        = cfg.demoMode||'外送';
  // 菜單
  renderMenu();
  // 圖片
  renderImages();
  // 配色
  renderColors();
}

/* ══════════ 菜單 ══════════ */
function renderMenu(){
  const grid=document.getElementById('menu-grid');
  grid.innerHTML='';
  (cfg.menuItems||[]).forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='menu-item';
    div.innerHTML=`
      <input type="text" value="${esc(item.name)}" placeholder="品項名稱"
        onchange="cfg.menuItems[${i}].name=this.value" style="width:100%;min-width:120px;
        background:rgba(255,255,255,.06);border:1px solid var(--hair);border-radius:8px;
        padding:7px 10px;color:var(--ink);font-size:14px;font-family:var(--sans);outline:none;">
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <label style="font-size:11px;color:var(--muted)">定價</label>
        <input type="number" value="${item.price||0}" min="0" step="10"
          onchange="cfg.menuItems[${i}].price=parseInt(this.value)||0"
          style="width:90px;text-align:right;background:rgba(255,255,255,.06);border:1px solid var(--hair);
          border-radius:8px;padding:7px 10px;color:var(--gold);font-size:14px;font-family:var(--sans);outline:none;">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
        <label style="font-size:11px;color:var(--muted)">預設數量</label>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
          <span class="qty-val" id="qty-${i}">${item.qty||1}</span>
          <button class="qty-btn" onclick="changeQty(${i},+1)">＋</button>
        </div>
      </div>
      <button class="del-btn" onclick="removeItem(${i})" title="刪除品項">✕</button>
    `;
    grid.appendChild(div);
  });
}

function changeQty(i,d){
  cfg.menuItems[i].qty=Math.max(1,(cfg.menuItems[i].qty||1)+d);
  document.getElementById('qty-'+i).textContent=cfg.menuItems[i].qty;
}

function removeItem(i){
  cfg.menuItems.splice(i,1);
  renderMenu();
}

document.getElementById('btn-add-item').onclick=()=>{
  const name=document.getElementById('new-item-name').value.trim();
  const price=parseInt(document.getElementById('new-item-price').value)||0;
  if(!name){ toast('請輸入品項名稱'); return; }
  cfg.menuItems=cfg.menuItems||[];
  cfg.menuItems.push({ name, price, qty:1 });
  renderMenu();
  document.getElementById('new-item-name').value='';
  document.getElementById('new-item-price').value='';
  toast('品項已新增');
};

/* ══════════ 圖片 ══════════ */
function handleImgUpload(input){
  const target=input.dataset.target;
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    cfg.images=cfg.images||{};
    cfg.images[target]=e.target.result;
    showThumb(target, e.target.result);
    toast('圖片已載入，請記得儲存設定');
  };
  reader.readAsDataURL(file);
}

function showThumb(target, src){
  const placeholder=document.getElementById(target+'-placeholder');
  const thumb=document.getElementById(target+'-thumb');
  if(src){
    placeholder.style.display='none';
    thumb.src=src;
    thumb.style.display='block';
  } else {
    placeholder.style.display='flex';
    thumb.style.display='none';
    thumb.src='';
  }
}

function removeImg(target,e){
  e.stopPropagation();
  cfg.images=cfg.images||{};
  cfg.images[target]=null;
  showThumb(target,null);
  toast('圖片已移除');
}

function renderImages(){
  ['logo','banner','watermark','stamp'].forEach(key=>{
    showThumb(key, (cfg.images||{})[key]||null);
  });
}

/* ══════════ 配色 ══════════ */
function renderColors(){
  const grid=document.getElementById('color-grid');
  grid.innerHTML='';
  const colors=cfg.colors||DEFAULT_CFG.colors;
  Object.entries(DEFAULT_COLORS).forEach(([key,meta])=>{
    const val=colors[key]||meta.val;
    const div=document.createElement('div');
    div.className='color-item';
    div.innerHTML=`
      <label>${meta.label}</label>
      <div class="color-row">
        <input type="color" value="${val}" id="col-picker-${key}" oninput="syncColor('${key}',this.value)">
        <input type="text" value="${val}" id="col-text-${key}" maxlength="9"
          oninput="syncColorText('${key}',this.value)">
      </div>
    `;
    grid.appendChild(div);
  });
}

function syncColor(key,val){
  cfg.colors=cfg.colors||{};
  cfg.colors[key]=val;
  document.getElementById('col-text-'+key).value=val;
}
function syncColorText(key,val){
  if(/^#[0-9a-fA-F]{6}$/.test(val)){
    cfg.colors=cfg.colors||{};
    cfg.colors[key]=val;
    document.getElementById('col-picker-'+key).value=val;
  }
}
function resetColors(){
  cfg.colors=Object.fromEntries(Object.entries(DEFAULT_COLORS).map(([k,v])=>[k,v.val]));
  renderColors();
  toast('配色已重設為預設值');
}

/* ══════════ 儲存 ══════════ */
document.getElementById('btn-save').onclick=saveCfg;

function saveCfg(){
  // 收集品牌
  cfg.brand         = document.getElementById('cfg-brand').value.trim()||'順記';
  cfg.brandSub      = document.getElementById('cfg-brandSub').value.trim();
  cfg.footer        = document.getElementById('cfg-footer').value.trim();
  cfg.communityUrl  = document.getElementById('cfg-community').value.trim();
  cfg.demoPrefix    = document.getElementById('demo-prefix').value.trim()||'SJ';
  cfg.demoMode      = document.getElementById('demo-mode').value;

  try {
    localStorage.setItem('shunji_admin_cfg', JSON.stringify(cfg));
    const s=document.getElementById('save-status');
    s.classList.add('show');
    setTimeout(()=>s.classList.remove('show'),2200);
    toast('✓ 設定已儲存');
  } catch(e){
    toast('⚠ 儲存失敗（可能是圖片太大）');
  }
}

/* ══════════ 預覽 ══════════ */
function openPreview(){
  saveCfg();
  window.open('order.html','_blank');
}

/* ══════════ 工具 ══════════ */
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ══════════ 初始檢查：若已登入（session）則跳過登入 ══════════ */
// (本範例不做 session persistence，每次重整需重新登入)
</script>
</body>
</html>
